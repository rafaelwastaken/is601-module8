<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .operations {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 30px 0;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 5px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .result-value {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            word-break: break-all;
        }

        .error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .error .result-value {
            color: #c33;
            font-size: 16px;
        }

        .success {
            background: #efe;
            border: 1px solid #cfc;
        }

        .success .result-label {
            color: #3c3;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 FastAPI Calculator</h1>

        <div class="input-group">
            <label for="num1">First Number:</label>
            <input type="number" id="num1" placeholder="Enter first number" step="any">
        </div>

        <div class="input-group">
            <label for="num2">Second Number:</label>
            <input type="number" id="num2" placeholder="Enter second number" step="any">
        </div>

        <div class="operations">
            <button onclick="calculate('add')">➕ Add</button>
            <button onclick="calculate('subtract')">➖ Subtract</button>
            <button onclick="calculate('multiply')">✖️ Multiply</button>
            <button onclick="calculate('divide')">➗ Divide</button>
        </div>

        <div class="result" id="result">
            <div class="result-label" id="operation-label">Result:</div>
            <div class="result-value" id="result-value">0</div>
        </div>

        <footer>
            <p>IS601 - Python for Web API Development</p>
        </footer>
    </div>

    <script>
        async function calculate(operation) {
            const num1 = parseFloat(document.getElementById('num1').value);
            const num2 = parseFloat(document.getElementById('num2').value);
            const resultDiv = document.getElementById('result');
            const resultValue = document.getElementById('result-value');
            const operationLabel = document.getElementById('operation-label');

            // Validation
            if (isNaN(num1) || isNaN(num2)) {
                resultDiv.className = 'result show error';
                resultValue.textContent = 'Please enter valid numbers';
                return;
            }

            try {
                const response = await fetch(`/${operation}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        a: num1,
                        b: num2
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    const operationSymbols = {
                        'add': '+',
                        'subtract': '-',
                        'multiply': '×',
                        'divide': '÷'
                    };
                    operationLabel.textContent = `${num1} ${operationSymbols[operation]} ${num2} =`;
                    resultValue.textContent = data.result;
                    resultDiv.className = 'result show success';
                } else {
                    resultDiv.className = 'result show error';
                    resultValue.textContent = data.error || 'An error occurred';
                }
            } catch (error) {
                resultDiv.className = 'result show error';
                resultValue.textContent = 'Error: ' + error.message;
            }
        }

        // Allow Enter key to trigger calculation
        document.getElementById('num1').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('num2').focus();
        });

        document.getElementById('num2').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculate('add');
        });
    </script>
</body>
</html>
